# Stage Idol Calendar - Nginx Clean URL Configuration
# Nginx config equivalent of Apache .htaccess files
#
# Usage:
# 1. Copy this file to /etc/nginx/sites-available/stage-idol-calendar.conf
# 2. Edit server_name, root, and fastcgi_pass to match your environment
# 3. Create symlink: ln -s /etc/nginx/sites-available/stage-idol-calendar.conf /etc/nginx/sites-enabled/
# 4. Test config: nginx -t
# 5. Reload: nginx -s reload

server {
    listen 80;
    server_name yourdomain.com;
    root /var/www/html;
    index index.php;

    # Disable directory listing (equivalent to Options -Indexes)
    autoindex off;

    # Security Headers (equivalent to mod_headers in root .htaccess)
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    # =========================================================================
    # Block sensitive directories — Deny from all
    # Equivalent to .htaccess in data/, cache/, backups/, ics/
    # =========================================================================
    location ~* ^/(data|cache|backups|ics)(/|$) {
        deny all;
    }

    # =========================================================================
    # Restrict internal directories — LAN/localhost only
    # Equivalent to .htaccess in config/, functions/, tests/, tools/
    # (Adjust IP ranges to match your network)
    # =========================================================================
    location ~* ^/(config|functions|tests|tools)(/|$) {
        allow 127.0.0.1;
        allow ::1;
        allow 192.168.0.0/16;
        allow 10.0.0.0/8;
        deny all;
    }

    # =========================================================================
    # Block sensitive file types
    # Equivalent to <FilesMatch> in root .htaccess
    # =========================================================================

    # Block database files (applies to all paths, not just root)
    location ~* \.(db|sqlite|sqlite3)$ {
        deny all;
    }

    # Block dotfiles (e.g. .env, .git, .htaccess)
    location ~ /\. {
        deny all;
    }

    # Block markdown files
    location ~* \.md$ {
        deny all;
    }

    # =========================================================================
    # Clean URLs — URL Rewriting
    # Equivalent to mod_rewrite in root .htaccess
    # =========================================================================

    # Event path with subpage: /event/slug/credits → credits.php?event=slug
    location ~ ^/event/([^/]+)/([^/]+)$ {
        rewrite ^/event/([^/]+)/([^/]+)$ /$2.php?event=$1 last;
    }

    # Event path main page: /event/slug → index.php?event=slug
    location ~ ^/event/([^/]+)/?$ {
        rewrite ^/event/([^/]+)/?$ /index.php?event=$1 last;
    }

    # api/ subdirectory clean URLs: /api/request → api/request.php
    # Equivalent to RewriteRule ^api/([^/]+)$ api/$1.php
    location ~ ^/api/([^/]+)$ {
        rewrite ^/api/([^/]+)$ /api/$1.php last;
    }

    # Admin — no IP restriction (admin/.htaccess has all rules commented out)
    location /admin {
        try_files $uri $uri/ /admin/index.php?$query_string;
    }

    # Clean URLs for public pages — strip .php extension
    # Equivalent to RewriteRule ^([^/]+)$ $1.php
    location / {
        try_files $uri $uri/ $uri.php?$query_string;
    }

    # =========================================================================
    # PHP Processing
    # =========================================================================
    location ~ \.php$ {
        include fastcgi_params;
        fastcgi_pass unix:/run/php/php8.1-fpm.sock;  # Adjust for your PHP version
        fastcgi_index index.php;
        fastcgi_param SCRIPT_FILENAME $document_root$fastcgi_script_name;
    }
}
